BASE_TASK_CONFIG_PATH: "configs/tasks/objectnav_mp3d_oracle_semmap.yaml"
CMD_TRAILING_OPTS: ["TASK_CONFIG.ENVIRONMENT.ITERATOR_OPTIONS.MAX_SCENE_REPEAT_STEPS", "50000"]
ENV_NAME: "SimpleRLEnv"
SIMULATOR_GPU_ID: 0
TORCH_GPU_ID: 0
VIDEO_OPTION: []
TENSORBOARD_DIR: "tb_dinov2_oracle_semmap"
VIDEO_DIR: "video_dir"
TEST_EPISODE_COUNT: -1
EVAL_CKPT_PATH_DIR: "data/new_checkpoints_dinov2_oracle_semmap"
NUM_ENVIRONMENTS: 4
CHECKPOINT_FOLDER: "data/new_checkpoints_dinov2_oracle_semmap"
TRAINER_NAME: "pirlnav-il"
# Oracle mode never reads live depth/semantic, so we only declare RGB here
# (kept for eval video recording). habitat-lab/.../env_utils.py:99 copies
# this into AGENT_0.SENSORS, so a top-level override is what actually
# disables the depth/semantic framebuffer passes.
SENSORS: ["RGB_SENSOR"]
NUM_UPDATES: 20000
LOG_INTERVAL: 10
NUM_CHECKPOINTS: 10
FORCE_TORCH_SINGLE_THREADED: True

EVAL:
  SPLIT: "train"

IL:
  POLICY:
    name: "ObjectNavILMAEPolicy"

RL:
  SUCCESS_REWARD: 2.5
  SLACK_REWARD: -1e-3

POLICY:
  CRITIC:
    no_critic: True
  RGB_ENCODER:
    backbone: "dinov2_base"
    pretrained_encoder: null
    dinov2_model_name: "facebook/dinov2-base"
    dinov2_resize_h: 476
    dinov2_resize_w: 630
    dinov2_output_dim: 768
  MAP_ENCODER:
    embedding_size: 32
    backbone: "resnet18"
