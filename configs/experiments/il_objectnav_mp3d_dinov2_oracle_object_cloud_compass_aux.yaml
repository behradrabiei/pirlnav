BASE_TASK_CONFIG_PATH: "configs/tasks/objectnav_mp3d_oracle_object_cloud_compass_aux.yaml"
CMD_TRAILING_OPTS: ["TASK_CONFIG.ENVIRONMENT.ITERATOR_OPTIONS.MAX_SCENE_REPEAT_STEPS", "50000"]
ENV_NAME: "SimpleRLEnv"
SIMULATOR_GPU_ID: 0
TORCH_GPU_ID: 0
VIDEO_OPTION: []
TENSORBOARD_DIR: "tb_dinov2_oracle_object_cloud_compass_aux"
VIDEO_DIR: "video_dir"
TEST_EPISODE_COUNT: -1
EVAL_CKPT_PATH_DIR: "data/new_checkpoints_dinov2_oracle_object_cloud_compass_aux"
NUM_ENVIRONMENTS: 4
CHECKPOINT_FOLDER: "data/new_checkpoints_dinov2_oracle_object_cloud_compass_aux"
TRAINER_NAME: "pirlnav-il"
# Oracle mode never reads live depth/semantic, so we only declare RGB here
# (kept for eval video recording).
SENSORS: ["RGB_SENSOR"]
NUM_UPDATES: 20000
LOG_INTERVAL: 10
NUM_CHECKPOINTS: 10
FORCE_TORCH_SINGLE_THREADED: True

EVAL:
  SPLIT: "train"

IL:
  POLICY:
    name: "ObjectNavILMAEPolicy"
  BehaviorCloning:
    # Weight on the goal-compass auxiliary MSE loss applied to the point-
    # transformer's 12-D compass head. The oracle GoalCompassSensor value
    # is used only as a regression label here; it is never fed into the
    # policy at train or eval time.
    compass_aux_coef: 1.0

RL:
  SUCCESS_REWARD: 2.5
  SLACK_REWARD: -1e-3

POLICY:
  CRITIC:
    no_critic: True
  RGB_ENCODER:
    backbone: "dinov2_base"
    pretrained_encoder: null
    dinov2_model_name: "facebook/dinov2-base"
    dinov2_resize_h: 252
    dinov2_resize_w: 252
    dinov2_output_dim: 768
  OBJECT_CLOUD_ENCODER:
    embedding_size: 32
    # Toggles the 12-D compass head, goal-conditioned encoder (CLS query
    # biased by goal-class embedding + per-object is_goal flag), and
    # compass_proj Linear(12, 32) into the GRU.
    compass_aux_loss: True
