# Full-MP3D online-DINOv2 + online-object-cloud IL experiment.
#
# Differences vs configs/experiments/il_objectnav_mp3d_dinov2_object_cloud.yaml:
#   - BASE_TASK_CONFIG_PATH points at the full-MP3D task config
#     (objectnav_mp3d_object_cloud_full.yaml: THDA 70k DATA_PATH,
#     MAX_OBJECTS=300, recomputed INFLECTION_COEF).
#   - OBJECT_CLOUD_ENCODER enlarged: d_model 64->128, num_layers 2->4,
#     embedding_size 32->64, ffn_expansion 2->4. The GRU input projection
#     auto-resizes (rnn_input_size grows 672->704 -- see plan note).
#     STATE_ENCODER.hidden_size stays 2048 -- only the point transformer
#     was asked to grow.
#   - MAX_SCENE_REPEAT_STEPS lowered 50000->5000 so each rank cycles more
#     often through its slice of the 56 demo scenes (more diversity per
#     update, more Lustre-side .glb loads).
#   - NUM_ENVIRONMENTS=8 / NUM_UPDATES=125000 target ~500M total env steps
#     across 8 ranks (2 GH200 nodes x 4 GPUs), matching the paper.
#   - NUM_CHECKPOINTS=50 (was 10) for finer-grained checkpoint coverage
#     over the longer run.
#
# IL.BehaviorCloning hyperparameters (lr=1e-3, num_steps=64, num_mini_batch=2,
# linear LR decay) are paper-faithful and already the codebase defaults in
# pirlnav/config.py; they are intentionally NOT overridden here.
BASE_TASK_CONFIG_PATH: "configs/tasks/objectnav_mp3d_object_cloud_full.yaml"
CMD_TRAILING_OPTS: ["TASK_CONFIG.ENVIRONMENT.ITERATOR_OPTIONS.MAX_SCENE_REPEAT_STEPS", "5000"]
ENV_NAME: "SimpleRLEnv"
SIMULATOR_GPU_ID: 0
TORCH_GPU_ID: 0
VIDEO_OPTION: []
TENSORBOARD_DIR: "tb_dinov2_object_cloud_full"
VIDEO_DIR: "video_dir"
TEST_EPISODE_COUNT: -1
EVAL_CKPT_PATH_DIR: "data/new_checkpoints_dinov2_object_cloud_full"
NUM_ENVIRONMENTS: 8
CHECKPOINT_FOLDER: "data/new_checkpoints_dinov2_object_cloud_full"
TRAINER_NAME: "pirlnav-il"
SENSORS: ["RGB_SENSOR", "DEPTH_SENSOR", "SEMANTIC_SENSOR"]
NUM_UPDATES: 125000
LOG_INTERVAL: 10
NUM_CHECKPOINTS: 50
FORCE_TORCH_SINGLE_THREADED: True

EVAL:
  SPLIT: "train"

IL:
  POLICY:
    name: "ObjectNavILMAEPolicy"

RL:
  SUCCESS_REWARD: 2.5
  SLACK_REWARD: -1e-3

POLICY:
  CRITIC:
    no_critic: True
  RGB_ENCODER:
    backbone: "dinov2_base"
    pretrained_encoder: null
    dinov2_model_name: "facebook/dinov2-base"
    dinov2_resize_h: 476
    dinov2_resize_w: 630
    dinov2_output_dim: 768
  OBJECT_CLOUD_ENCODER:
    embedding_size: 64
    num_classes: 21
    d_model: 128
    num_layers: 4
    rpe_mode: "log_distance"
    ffn_expansion: 4
