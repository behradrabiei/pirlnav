# Full-MP3D ObjectNav task config for online-DINOv2 + online-object-cloud IL.
#
# Differences vs configs/tasks/objectnav_mp3d_object_cloud.yaml:
#   - DATA_PATH points at the *21-class filtered* THDA 70k demonstrations
#     (56 MP3D scenes, 60085 episodes, canonical 21 ObjectNav categories,
#     with reference_replay actions). The unfiltered THDA bundle ships with
#     a 28-entry category_to_task_category_id table; the 7 THDA-paper extras
#     (foodstuff, stationery, fruit, plaything, hand_tool, game_equipment,
#     kitchenware) have no mpcat40_idx -> task_id mapping in pirlnav, so
#     their episodes are dropped via scripts/filter_mp3d_thda_to_21cat.py
#     (see DELTAAI_CONTAINER.md).
#   - EGO_OBJECT_CLOUD_SENSOR.MAX_OBJECTS bumped 80 -> 300 to accommodate the
#     larger object population in full MP3D scenes (whole-scene rather than
#     1-scene 6-cat subset).
#   - INFLECTION_COEF recomputed from the filtered dataset
#     (scripts/compute_inflection_coef.py reports 3.513870128085 over
#     60085 episodes / 14.1M steps / 28.459% inflection rate).
#
# Sensor list and AGENT_0 sensors are unchanged: online cloud accumulates
# from per-step DEPTH + SEMANTIC, RGB feeds the online DINOv2 backbone.
ENVIRONMENT:
  MAX_EPISODE_STEPS: 500

SIMULATOR:
  FORWARD_STEP_SIZE: 0.25
  TURN_ANGLE: 30
  TILT_ANGLE: 30
  ACTION_SPACE_CONFIG: "v1"
  SCENE_DATASET: "data/scene_datasets/mp3d/mp3d.scene_dataset_config.json"
  AGENT_0:
    SENSORS: ['RGB_SENSOR', 'DEPTH_SENSOR', 'SEMANTIC_SENSOR']
    HEIGHT: 0.88
    RADIUS: 0.18
  HABITAT_SIM_V0:
    GPU_DEVICE_ID: 0
    ALLOW_SLIDING: False
  SEMANTIC_SENSOR:
    WIDTH: 640
    HEIGHT: 480
    HFOV: 79
    POSITION: [0, 0.88, 0]
  RGB_SENSOR:
    WIDTH: 640
    HEIGHT: 480
    HFOV: 79
    POSITION: [0, 0.88, 0]
  DEPTH_SENSOR:
    WIDTH: 640
    HEIGHT: 480
    HFOV: 79
    MIN_DEPTH: 0.5
    MAX_DEPTH: 5.0
    POSITION: [0, 0.88, 0]
    NORMALIZE_DEPTH: False

TASK:
  TYPE: ObjectNav-v2
  POSSIBLE_ACTIONS: ["STOP", "MOVE_FORWARD", "TURN_LEFT", "TURN_RIGHT", "LOOK_UP", "LOOK_DOWN"]
  SUCCESS_DISTANCE: 0.1

  SENSORS: ['OBJECTGOAL_SENSOR', 'COMPASS_SENSOR', 'GPS_SENSOR', 'EGO_OBJECT_CLOUD_SENSOR']
  GOAL_SENSOR_UUID: objectgoal

  DEMONSTRATION_SENSOR:
    TYPE: DemonstrationSensor
  DEMONSTRATION_SENSOR_UUID: "next_actions"

  INFLECTION_WEIGHT_SENSOR:
    TYPE: InflectionWeightSensor
    INFLECTION_COEF: 3.513870128085

  INFLECTION_WEIGHT_SENSOR_UUID: "inflection_weight"

  EGO_OBJECT_CLOUD_SENSOR:
    TYPE: EgoObjectCloudSensor
    MAX_OBJECTS: 300
    MIN_MASK_PIXELS: 100
  EGO_OBJECT_CLOUD_SENSOR_UUID: "ego_object_cloud"

  MEASUREMENTS: ['DISTANCE_TO_GOAL', 'SUCCESS', 'SPL', 'SOFT_SPL', 'SPARSE_REWARD']

  DISTANCE_TO_GOAL:
    DISTANCE_TO: VIEW_POINTS

  SUCCESS:
    SUCCESS_DISTANCE: 0.1

DATASET:
  TYPE: ObjectNav-v2
  SPLIT: train
  DATA_PATH: "data/datasets/objectnav/objectnav_mp3d/objectnav_mp3d_thda_70k_21cat/{split}/{split}.json.gz"
  SCENES_DIR: "data/scene_datasets/"
  MAX_EPISODE_STEPS: 500
