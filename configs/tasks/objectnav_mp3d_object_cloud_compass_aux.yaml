ENVIRONMENT:
  MAX_EPISODE_STEPS: 500

SIMULATOR:
  FORWARD_STEP_SIZE: 0.25
  TURN_ANGLE: 30
  TILT_ANGLE: 30
  ACTION_SPACE_CONFIG: "v1"
  SCENE_DATASET: "data/scene_datasets/mp3d/mp3d.scene_dataset_config.json"
  AGENT_0:
    SENSORS: ['RGB_SENSOR', 'DEPTH_SENSOR', 'SEMANTIC_SENSOR']
    HEIGHT: 0.88
    RADIUS: 0.18
  HABITAT_SIM_V0:
    GPU_DEVICE_ID: 0
    ALLOW_SLIDING: False
  SEMANTIC_SENSOR:
    WIDTH: 640
    HEIGHT: 480
    HFOV: 79
    POSITION: [0, 0.88, 0]
  RGB_SENSOR:
    WIDTH: 640
    HEIGHT: 480
    HFOV: 79
    POSITION: [0, 0.88, 0]
  DEPTH_SENSOR:
    WIDTH: 640
    HEIGHT: 480
    HFOV: 79
    MIN_DEPTH: 0.5
    MAX_DEPTH: 5.0
    POSITION: [0, 0.88, 0]
    NORMALIZE_DEPTH: False

TASK:
  TYPE: ObjectNav-v2
  POSSIBLE_ACTIONS: ["STOP", "MOVE_FORWARD", "TURN_LEFT", "TURN_RIGHT", "LOOK_UP", "LOOK_DOWN"]
  SUCCESS_DISTANCE: 0.1

  # GOAL_COMPASS_SENSOR is listed here so the privileged 12-bin compass
  # lands in batch["observations"]["goal_compass"] for the auxiliary MSE
  # loss inside ILAgent.update.  When POLICY.OBJECT_CLOUD_ENCODER.compass_aux_loss
  # is True the policy explicitly skips creating goal_compass_embedding, so
  # the oracle value is *never* fed into the GRU -- it is only a training
  # label.
  SENSORS: ['OBJECTGOAL_SENSOR', 'COMPASS_SENSOR', 'GPS_SENSOR', 'CACHED_DINOV2_SENSOR', 'EGO_OBJECT_CLOUD_SENSOR', 'GOAL_COMPASS_SENSOR']
  GOAL_SENSOR_UUID: objectgoal

  DEMONSTRATION_SENSOR:
    TYPE: DemonstrationSensor
  DEMONSTRATION_SENSOR_UUID: "next_actions"

  INFLECTION_WEIGHT_SENSOR:
    TYPE: InflectionWeightSensor
    INFLECTION_COEF: 3.234951275740812

  INFLECTION_WEIGHT_SENSOR_UUID: "inflection_weight"

  CACHED_DINOV2_SENSOR:
    TYPE: CachedDINOv2Sensor
    CACHE_ROOT: "data/dinov2_cache"
    FEATURE_DIM: 768
    LRU_SIZE: 64
  CACHED_DINOV2_SENSOR_UUID: "cached_dinov2_feature"

  EGO_OBJECT_CLOUD_SENSOR:
    TYPE: EgoObjectCloudSensor
    MAX_OBJECTS: 80
    MIN_MASK_PIXELS: 100
  EGO_OBJECT_CLOUD_SENSOR_UUID: "ego_object_cloud"

  GOAL_COMPASS_SENSOR:
    TYPE: GoalCompassSensor
    NUM_BINS: 12
  GOAL_COMPASS_SENSOR_UUID: "goal_compass"

  MEASUREMENTS: ['DISTANCE_TO_GOAL', 'SUCCESS', 'SPL', 'SOFT_SPL', 'SPARSE_REWARD']

  DISTANCE_TO_GOAL:
    DISTANCE_TO: VIEW_POINTS

  SUCCESS:
    SUCCESS_DISTANCE: 0.1

DATASET:
  TYPE: ObjectNav-v2
  SPLIT: train
  DATA_PATH: "data/datasets/objectnav/objectnav_mp3d/objectnav_mp3d_1scene_6cat/{split}/{split}.json.gz"
  SCENES_DIR: "data/scene_datasets/"
  MAX_EPISODE_STEPS: 500
